name: CI

# 設定觸發條件：當程式碼 push（推度）到 main 分支，或發起 pull request 時觸發
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 具體要執行的任務
jobs:
  build:
    # 使用最新版的 Ubuntu 虛擬環境
    runs-on: ubuntu-latest

    steps:
    # 步驟 1：下載你的專案程式碼到虛擬主機中
    - name: Checkout code
      uses: actions/checkout@v4

    # 步驟 2：執行測試或印出文字（你可以把這裡換成你的編譯或測試指令）
    - name: Run a one-line script
      run: echo "Hello, GitHub Actions! 你的第一個工作流程成功運行！"
