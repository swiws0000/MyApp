<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排版與字數計算機</title>
    <style>
        :root {
            --prussian-dark: #001a2d;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --bright-blue: #6295FE;
            --light-purple: #A9B5FF;
            --neon-green: #39FF14;
            --soft-pink: #FAA7B9;
            --text-light: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--prussian-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #031B89, var(--bright-blue));
            border-radius: 50%;
            z-index: -1;
            filter: blur(140px);
            opacity: 0.15;
            top: 10%;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: var(--card-bg);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-btn:hover {
            color: var(--text-light);
            border-color: var(--bright-blue);
            background: rgba(98, 149, 254, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, var(--bright-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(98, 149, 254, 0.2);
        }

        .main-container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 2rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        /* 儀表板數據區 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1rem 0.5rem;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        .stat-box:hover {
            border-color: var(--bright-blue);
            background: rgba(98, 149, 254, 0.02);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--bright-blue);
            text-shadow: 0 0 10px rgba(98, 149, 254, 0.3);
        }

        /* 輸入框區 */
        .textarea-wrapper {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem;
            color: var(--text-light);
            font-family: 'Consolas', 'PingFang TC', monospace;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }
        textarea:focus {
            border-color: var(--bright-blue);
            box-shadow: 0 0 20px rgba(98, 149, 254, 0.15);
        }

        /* 按鈕控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-light);
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--light-purple);
            transform: translateY(-1px);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--bright-blue), var(--light-purple));
            color: #001a2d;
            border: none;
            grid-column: span 4;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 0.4rem;
        }
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(98, 149, 254, 0.4);
            color: #001a2d;
        }

        /* 複製成功的漣漪特效 */
        .ripple-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 24px;
            pointer-events: none;
            border: 2px solid var(--neon-green);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: scale(1);
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        @media (max-width: 700px) {
            .dashboard { grid-template-columns: repeat(3, 1fr); }
            .control-panel { grid-template-columns: repeat(2, 1fr); }
            .primary-btn { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← 返回應用總覽</a>

    <h1>排版與字數計算機</h1>

    <div class="main-container" id="mainContainer">
        <div class="ripple-overlay" id="ripple"></div>
        
        <div class="dashboard">
            <div class="stat-box">
                <div class="stat-label">總字數 (含空白)</div>
                <div id="val-total" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">純中文字數</div>
                <div id="val-cjk" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">英文單字數</div>
                <div id="val-words" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">數位與符號</div>
                <div id="val-symbols" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">精準字數 (不含空)</div>
                <div id="val-no-space" class="stat-value">0</div>
            </div>
        </div>

        <div class="textarea-wrapper">
            <textarea id="textInput" placeholder="請在此輸入或貼上你的賽博文本..."></textarea>
        </div>

        <div class="control-panel">
            <button class="action-btn" id="btn-full-half">全形 ➔ 半形</button>
            <button class="action-btn" id="btn-half-full">半形 ➔ 全形</button>
            <button class="action-btn" id="btn-rm-dup">消除重複行</button>
            <button class="action-btn" id="btn-rm-empty">刪除空白行</button>
            
            <button class="action-btn" id="btn-compress" style="grid-column: span 4;">一鍵極致文本壓縮 (清除所有空隙)</button>
            <button class="action-btn primary-btn" id="btn-copy">⚡ 一鍵複製矩陣文本 ⚡</button>
        </div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <script>
        const textInput = document.getElementById('textInput');
        const mainContainer = document.getElementById('mainContainer');
        const ripple = document.getElementById('ripple');
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');

        // 儀表板元素
        const valTotal = document.getElementById('val-total');
        const valCjk = document.getElementById('val-cjk');
        const valWords = document.getElementById('val-words');
        const valSymbols = document.getElementById('val-symbols');
        const valNoSpace = document.getElementById('val-no-space');

        // 粒子引擎變數
        let particles = [];
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        });

        // --- 街機 Chiptune 音效引擎 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'square'; 

            if (type === 'type') { // 打字：乾淨簡短的低音敲擊回饋
                osc.frequency.setValueAtTime(145, now); 
                gainNode.gain.setValueAtTime(0.07, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.03);
                osc.start(); osc.stop(now + 0.03);
            } 
            else if (type === 'action') { // 排版按鈕科技音
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(700, now + 0.08);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.08);
                osc.start(); osc.stop(now + 0.08);
            } 
            else if (type === 'copy') { // 複製成功和弦音
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(550, now + 0.06);
                osc.frequency.setValueAtTime(800, now + 0.12);
                gainNode.gain.setValueAtTime(0.18, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            }
        }

        // --- 核心計算邏輯 ---
        function calculateStats() {
            const str = textInput.value;

            valTotal.innerText = str.length;

            const cjkMatch = str.match(/[\u4e00-\u9fa5]/g);
            valCjk.innerText = cjkMatch ? cjkMatch.length : 0;

            const wordsMatch = str.match(/[a-zA-Z]+/g);
            valWords.innerText = wordsMatch ? wordsMatch.length : 0;

            const noSpaceMatch = str.match(/\S/g);
            const noSpaceLen = noSpaceMatch ? noSpaceMatch.length : 0;
            valNoSpace.innerText = noSpaceLen;

            const alphaMatch = str.match(/[a-zA-Z]/g);
            const alphaLen = alphaMatch ? alphaMatch.length : 0;
            const cjkLen = cjkMatch ? cjkMatch.length : 0;
            const symbolsLen = Math.max(0, noSpaceLen - cjkLen - alphaLen);
            valSymbols.innerText = symbolsLen;
        }

        // --- 粒子噴發效果 ---
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 4 + 1.5, color: color, alpha: 1, decay: Math.random() * 0.03 + 0.02
                });
            }
        }

        function updateAndDrawParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                pCtx.save();
                pCtx.globalAlpha = p.alpha;
                pCtx.fillStyle = p.color;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                pCtx.fill();
                pCtx.restore();
            }
            requestAnimationFrame(updateAndDrawParticles);
        }
        updateAndDrawParticles();

        textInput.addEventListener('input', () => {
            playSound('type');
            calculateStats();
        });

        // --- 排版功能 ---
        
        // 1. 全形轉半形
        document.getElementById('btn-full-half').addEventListener('click', (e) => {
            let str = textInput.value;
            let result = "";
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (code >= 65281 && code <= 65374) {
                    result += String.fromCharCode(str.charCodeAt(i) - 65248);
                } else if (code === 12288) { 
                    result += String.fromCharCode(32);
                } else {
                    result += str.charAt(i);
                }
            }
            textInput.value = result;
            processActionEffects(e, 'var(--light-purple)');
        });

        // 2. 半形轉全形
        document.getElementById('btn-half-full').addEventListener('click', (e) => {
            let str = textInput.value;
            let result = "";
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                if (code >= 33 && code <= 126) {
                    result += String.fromCharCode(str.charCodeAt(i) + 65248);
                } else if (code === 32) { 
                    result += String.fromCharCode(12288);
                } else {
                    result += str.charAt(i);
                }
            }
            textInput.value = result;
            processActionEffects(e, 'var(--soft-pink)');
        });

        // 3. 消除重複行
        document.getElementById('btn-rm-dup').addEventListener('click', (e) => {
            let lines = textInput.value.split('\n');
            let uniqueLines = [...new Set(lines)];
            textInput.value = uniqueLines.join('\n');
            processActionEffects(e, 'var(--bright-blue)');
        });

        // 4. 刪除空白行
        document.getElementById('btn-rm-empty').addEventListener('click', (e) => {
            let lines = textInput.value.split('\n');
            let filteredLines = lines.filter(line => line.trim() !== '');
            textInput.value = filteredLines.join('\n');
            processActionEffects(e, 'var(--light-purple)');
        });

        // 5. 極致文本壓縮
        document.getElementById('btn-compress').addEventListener('click', (e) => {
            textInput.value = textInput.value.replace(/\s+/g, '');
            processActionEffects(e, 'var(--neon-green)');
        });

        // 6. 一鍵複製功能
        document.getElementById('btn-copy').addEventListener('click', (e) => {
            if (!textInput.value) return;
            navigator.clipboard.writeText(textInput.value).then(() => {
                playSound('copy');
                
                ripple.style.transform = 'scale(1.02)';
                ripple.style.opacity = '1';
                setTimeout(() => {
                    ripple.style.transform = 'scale(1)';
                    ripple.style.opacity = '0';
                }, 400);

                const rect = e.target.getBoundingClientRect();
                createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 'var(--neon-green)');
            });
        });

        function processActionEffects(e, color) {
            playSound('action');
            calculateStats();
            
            const rect = e.target.getBoundingClientRect();
            createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, color);
        }
    </script>
</body>
</html>
